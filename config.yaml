# ── Hindi Script Detection ─────────────────────────────────────────
hindi_detection:
  unicode_start: 0x0900
  unicode_end: 0x097F
  min_hindi_ratio: 0.4

# ── Deduplication ──────────────────────────────────────────────────
deduplication:
  num_permutations: 128
  jaccard_threshold: 0.7
  shingle_size: 3

# ── Answer length filter ───────────────────────────────────────────
# From dataset stats: min answer = 20 chars, some are clearly too short
answer_length:
  min_chars: 30      # drop very short answers
  max_chars: 2000    # drop abnormally long ones (max was 37761 — outliers)

# ── Query length filter ────────────────────────────────────────────
query_length:
  min_chars: 5       # drop blank/empty queries (min was 0)
  max_chars: 500     # drop outliers (max was 2983)

# ── Model Config ───────────────────────────────────────────────────
model:
  base: "google/mt5-base"
  max_input_length: 256
  max_output_length: 128
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - "q"
      - "k"
      - "v"
      - "o"
      - "wi_0"
      - "wi_1"
      - "wo"

# ── Training Config ────────────────────────────────────────────────
training:
  sample_size: 20000
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  warmup_ratio: 0.05
  early_stopping_patience: 3
  train_val_test_split:
    train: 0.70
    val: 0.15
    test: 0.15

# ── RAG Config ─────────────────────────────────────────────────────
rag:
  embedding_model: "intfloat/multilingual-e5-small"
  embedding_dim: 384
  kb_size: 50000
  top_k: 3
  bm25_weight: 2.0

# ── Instruction Template ───────────────────────────────────────────
instruction_template: |
  निर्देश: आप एक कृषि विशेषज्ञ हैं। किसान की समस्या का उत्तर हिंदी में दें।
  राज्य: {state}
  फसल: {crop}
  समस्या का प्रकार: {intent}
  किसान का प्रश्न: {query}
  उत्तर: