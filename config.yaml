# ─── KisanMitra AI — Master Config ────────────────────────────────

project:
  name: "KisanMitra AI"
  version: "1.0.0"
  description: "Hindi-first agricultural advisory chatbot for Indian farmers"
  language: "hi"

# Target states for Hindi belt filtering
target_states:
  - "UTTAR PRADESH"
  - "RAJASTHAN"
  - "MADHYA PRADESH"
  - "BIHAR"
  - "HARYANA"
  - "JHARKHAND"
  - "JHARKAND"           # alternate spelling found in dataset
  - "UTTARAKHAND"
  - "CHHATTISGARH"
  - "HIMACHAL PRADESH"   # included — dataset shows 40K records

# ── Junk/Noise query patterns to DROP during cleaning ─────────────
# These are call-centre artifacts, not real farmer queries
noise_query_patterns:
  - "not respond by farmer"
  - "no response"
  - "abandoned"
  - "abandand"
  - "for calling kisaan call center"
  - "for calling kisan call center"
  - "ob call"
  - "blank query"
  - "test call"
  - "wrong number"
  - "call disconnected"
  - "farmer did not respond"
  - "no query"

